{% extends 'base.html' %}
{% block content %}

<section class="py-5 bg-light" style="min-height: 85vh;">
    <div class="container animate-up">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden text-center">
                    <!-- Top accent line -->
                    <div class="bg-success" style="height: 6px;"></div>
                    
                    <div class="card-body p-4 p-md-5">
                        <div class="stat-icon bg-success-light text-success mx-auto mb-4" style="width: 100px; height: 100px; font-size: 3rem; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
                            <i class="fas fa-check-double"></i>
                        </div>
                        
                        <h1 class="fw-black text-dark mb-4 display-6">Password Reset Success</h1>
                        
                        <div class="p-4 bg-light rounded-4 mb-5 border theme-border-soft">
                            <p class="text-muted mb-0">Your healthcare portal security credentials have been updated successfully. You can now use your new password to log in.</p>
                        </div>

                        <div class="d-grid gap-3">
                            <a href="{% url 'user_profile' %}" class="btn btn-primary rounded-pill py-3 fw-black shadow-lg">
                                <i class="fas fa-user-circle me-2"></i> RETURN TO MY DASHBOARD
                            </a>
                            <a href="{% url 'home' %}" class="btn btn-outline-light text-muted rounded-pill py-2 border shadow-sm">
                                <i class="fas fa-house-chimney me-2"></i> BACK TO HOME
                            </a>
                        </div>
                    </div>
                </div>
                
                <p class="text-center mt-4 text-muted extra-small">
                    <i class="fas fa-shield-halved me-1 text-success"></i> Account Protected by Multi-Factor Authentication
                </p>
            </div>
        </div>
    </div>
</section>

<style>
    .fw-black { font-weight: 900; }
    .bg-success-light { background-color: #f0fdf4; }
    .theme-border-soft { border-color: rgba(0, 65, 140, 0.05) !important; }
</style>

{% endblock %}
